services:
  # 1. FastAPI Web API & Celery Background Worker (Combined for Free Starter Pack)
  - type: web
    name: discoveryos-api
    plan: free
    env: python
    buildCommand: pip install -r backend/requirements.txt
    startCommand: cd backend && celery -A celery_app worker --loglevel=info --concurrency=1 & uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      # Database connection string (e.g. Supabase Postgres database URL)
      - key: DATABASE_URL
        sync: false
      
      # Redis connection string (Auto-configured from Render Redis)
      - key: REDIS_URL
        fromService:
          name: discoveryos-redis
          type: redis
          property: connectionString
      
      # Gemini API key for primary synthesis agent
      - key: GEMINI_API_KEY
        sync: false
      
      # Groq API key for fallback LLM agent
      - key: GROQ_API_KEY
        sync: false
      
      # Model configurations
      - key: AI_PRIMARY_MODEL
        value: gemini-3.1-flash-lite
      
      - key: AI_FALLBACK_MODEL
        value: llama-3.1-70b-versatile
      
      # Token authentication secret
      - key: JWT_SECRET_KEY
        generateValue: true
      
      - key: PYTHONPATH
        value: .

  # 2. Redis Cache/Broker Service
  - type: redis
    name: discoveryos-redis
    plan: free
    ipAllowList: [] # Only allow internal traffic within Render private network
