services:
  # 1. FastAPI API Web Service
  - type: web
    name: discoveryos-api
    env: python
    buildCommand: pip install -r backend/requirements.txt
    startCommand: cd backend && uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: discoveryos-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: discoveryos-redis
          type: redis
          property: connectionString
      - key: GEMINI_API_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: PYTHONPATH
        value: .

  # 2. Celery Background Worker Service
  - type: worker
    name: discoveryos-worker
    env: python
    buildCommand: pip install -r backend/requirements.txt
    startCommand: cd backend && celery -A celery_app worker --loglevel=info
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: discoveryos-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: discoveryos-redis
          type: redis
          property: connectionString
      - key: GEMINI_API_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: JWT_SECRET_KEY
        fromService:
          name: discoveryos-api
          type: web
          envVarKey: JWT_SECRET_KEY
      - key: PYTHONPATH
        value: .

  # 3. Redis Cache/Broker Service
  - type: redis
    name: discoveryos-redis
    plan: free
    ipAllowList: [] # Only allow internal traffic within Render private network

# 4. Managed PostgreSQL Database
databases:
  - name: discoveryos-db
    plan: free
