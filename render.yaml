services:
  # 1. FastAPI Web API & Celery Background Worker (Combined for Free Starter Pack)
  - type: web
    name: discoveryos-api
    plan: free
    env: python
    buildCommand: pip install -r backend/requirements.txt
    startCommand: cd backend && celery -A celery_app worker --loglevel=info --concurrency=1 & uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: discoveryos-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: discoveryos-redis
          type: redis
          property: connectionString
      - key: GEMINI_API_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: PYTHONPATH
        value: .

  # 2. Redis Cache/Broker Service
  - type: redis
    name: discoveryos-redis
    plan: free
    ipAllowList: [] # Only allow internal traffic within Render private network

# 3. Managed PostgreSQL Database
databases:
  - name: discoveryos-db
    plan: free
